    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('link');

        let timeLeft = 15;
        let timerElement = document.getElementById("timer");
        let btnElement = document.getElementById("continueBtn");

        let countdown = setInterval(function() {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.display = "none";
                btnElement.style.display = "inline-block";
                
                // Continue বাটনে আপনার Adsterra-এর অ্যাড লিংকটি বসানো হলো
                btnElement.href = "https://www.profitablecpmratenetwork.com/rqei6juu1q?key=6d896fe9be6648cd6be0102ddd7a2db8";
                btnElement.target = "_blank"; // এটি অ্যাডটিকে নতুন ট্যাবে খুলবে
                
                // অ্যাড খোলার সাথে সাথে মূল পেজকে page2.html-এ পাঠিয়ে দেওয়ার লজিক
                btnElement.onclick = function() {
                    setTimeout(function() {
                        window.location.href = "page2.html?link=" + targetUrl;
                    }, 500); // বাটনে ক্লিক করার আধা সেকেন্ড পর page2 তে চলে যাবে
                };
            }
        }, 1000);
    </script>

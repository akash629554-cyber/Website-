<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please Wait Again...</title>
    <style>
        body { font-family: Arial; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        .box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #timer { font-size: 40px; color: red; font-weight: bold; margin: 20px 0; }
        #continueBtn { display: none; padding: 12px 25px; background-color: #007bff; color: white; text-decoration: none; border-radius: 5px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>আরেকটু অপেক্ষা করুন...</h2>
        <div id="timer">15</div>
        <a id="continueBtn" href="#">Continue</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const targetUrl = urlParams.get('link');

        let timeLeft = 15;
        let timerElement = document.getElementById("timer");
        let btnElement = document.getElementById("continueBtn");

        let countdown = setInterval(function() {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.style.display = "none";
                btnElement.style.display = "inline-block";
                
                // বাটনে page3.html এর লিংক সেট করা
                btnElement.href = "page3.html?link=" + targetUrl;
            }
        }, 1000);
    </script>
</body>
</html>

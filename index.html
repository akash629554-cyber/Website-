<!DOCTYPE html>
<html lang="bn">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>লিংক শর্টনার</h2>
